# Render deployment configuration for Job Faculty Portal
# Features: AI-powered interviews, resume shortlisting, job applications
services:
  - type: web
    name: job-faculty
    runtime: node
    autoDeploy: true
    # Updated to trigger redeploy: 2026-05-20T00:00:00Z
    buildCommand: npm install && mkdir -p uploads
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENAI_API_KEY
        value: your-openai-api-key-here  # Required for AI interview assistance
      - key: JWT_SECRET
        value: your-jwt-secret-key-here  # Required for secure authentication
      - key: GOOGLE_CLIENT_ID
        value: 511476416933-ldnl6dlnmpkidc8boqnhckcjspouut9t.apps.googleusercontent.com
      - key: GOOGLE_CLIENT_ID_ALT
        value: 62016617558-2gcb7841fha9u1nre7alu2pt0s29b0m8.apps.googleusercontent.com
      - key: GOOGLE_CLIENT_SECRET
        value: your-google-client-secret-here
      - key: GOOGLE_REDIRECT_URI
        value: https://job-faculty.onrender.com/auth/google/callback
      - key: FIREBASE_CLIENT_ID
        value: 511476416933-ldnl6dlnmpkidc8boqnhckcjspouut9t.apps.googleusercontent.com
      - key: FIREBASE_CLIENT_ID_ALT
