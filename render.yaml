# Render deployment configuration for Job Faculty Portal
# Features: AI-powered interviews, resume shortlisting, job applications
services:
  - type: web
    name: job-faculty
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENAI_API_KEY
        value: your-openai-api-key-here  # Required for AI interview assistance
      - key: JWT_SECRET
        value: your-jwt-secret-key-here  # Required for secure authentication